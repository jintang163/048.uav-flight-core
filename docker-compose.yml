version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: uav-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: uav123456
      MYSQL_DATABASE: uav_flight
      MYSQL_USER: uav
      MYSQL_PASSWORD: uav123456
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deployment/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - uav-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "uav", "-puav123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uav-redis
    restart: unless-stopped
    command: redis-server --requirepass uav123456 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - uav-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "uav123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: uav-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - uav-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  nsqlookupd:
    image: nsqio/nsq:latest
    container_name: uav-nsqlookupd
    restart: unless-stopped
    command: /nsqlookupd
    ports:
      - "4160:4160"
      - "4161:4161"
    networks:
      - uav-network

  nsqd:
    image: nsqio/nsq:latest
    container_name: uav-nsqd
    restart: unless-stopped
    command: /nsqd --lookupd-tcp-address=nsqlookupd:4160 --data-path=/data
    depends_on:
      - nsqlookupd
    ports:
      - "4150:4150"
      - "4151:4151"
    volumes:
      - nsq-data:/data
    networks:
      - uav-network

  nsqadmin:
    image: nsqio/nsq:latest
    container_name: uav-nsqadmin
    restart: unless-stopped
    command: /nsqadmin --lookupd-http-address=nsqlookupd:4161
    depends_on:
      - nsqlookupd
    ports:
      - "4171:4171"
    networks:
      - uav-network

  prometheus:
    image: prom/prometheus:latest
    container_name: uav-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - uav-network

  grafana:
    image: grafana/grafana:latest
    container_name: uav-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - uav-network

  backend:
    build:
      context: ./groundstation-backend
      dockerfile: Dockerfile
    container_name: uav-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=uav
      - DB_PASSWORD=uav123456
      - DB_NAME=uav_flight
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=uav123456
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - NSQ_LOOKUPD_ADDRESS=nsqlookupd:4161
      - NSQ_NSQD_ADDRESS=nsqd:4150
    depends_on:
      - mysql
      - redis
      - minio
      - nsqd
    volumes:
      - ./deployment/certs:/app/certs
    networks:
      - uav-network

  frontend:
    build:
      context: ./groundstation-frontend
      dockerfile: Dockerfile
    container_name: uav-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - uav-network

volumes:
  mysql-data:
  redis-data:
  minio-data:
  nsq-data:
  prometheus-data:
  grafana-data:

networks:
  uav-network:
    driver: bridge
